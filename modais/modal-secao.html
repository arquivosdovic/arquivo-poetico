<div id="modal-secao"
    class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg w-full max-w-lg shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="flex items-center justify-between px-8 pt-6 pb-3 border-b border-gray-100 bg-white flex-shrink-0">
        <h3 id="modal-secao-titulo" class="text-xl font-bold">Nova Seção</h3>
        <div class="flex items-center gap-1 ml-4">
            <button type="button"
                onclick="document.getElementById('form-secao').requestSubmit()"
                title="Salvar (atalho: Ctrl+Enter)"
                class="w-8 h-8 flex items-center justify-center rounded-full bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-colors border border-emerald-200"
                aria-label="Salvar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                    <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
                </svg>
            </button>
            <button type="button"
                onclick="toggleModal('modal-secao')"
                title="Fechar (Esc)"
                class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors border border-gray-200"
                aria-label="Fechar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                    <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                </svg>
            </button>
        </div>
    </div>
        <div class="overflow-y-auto flex-1 px-8 py-6">
        <form id="form-secao" class="space-y-4">
            <input type="hidden" id="sec-edit-id">
            <label class="form-label">Título</label>
            <input type="text" id="sec-titulo" required>
            <label class="form-label">Vincular a</label>
            <select id="sec-vinculo"></select>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Sequência</label>
                    <input type="number" id="sec-sequencia">
                </div>
                <div>
                    <label class="form-label">Arquivo Capa</label>
                    <input type="file" id="sec-capa" accept="image/*">
                </div>
            </div>
            <label class="form-label">Descrição Capa</label>
            <textarea id="sec-capa-desc" class="h-20"></textarea>
            <label class="form-label">Versos de Abertura / Descrição</label>
            <textarea id="sec-abertura" class="h-20 font-serif"
                placeholder="Versos que iniciam esta seção..."></textarea>
            <div class="flex justify-end gap-2 pt-4">
                <button type="button" onclick="toggleModal('modal-secao')"
                    class="text-gray-600 px-4 py-2">Sair</button>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded">Salvar</button>
            </div>
        </form>
        </div>
    </div>
</div>
